<!DOCTYPE html>
<html>
<head>
    <title>Restaurant State Test Client</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #eee; padding: 20px; }
        h1 { color: #f59e0b; }
        #status { padding: 8px 12px; background: #333; border-radius: 6px; display: inline-block; }
        pre { background: #111; padding: 16px; border-radius: 6px; max-height: 70vh; overflow: auto; }
    </style>
</head>
<body>
    <h1>Restaurant Kitchen Test Client</h1>
    <div id="status">Connecting...</div>
    <div id="data"></div>

    <script>
        const socket = io('http://localhost:3001');

        socket.on('connect', () => {
            document.getElementById('status').textContent = 'Connected';
            socket.emit('register-client', 'test');
        });

        socket.on('restaurant-update', (data) => {
            document.getElementById('data').innerHTML =
                '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        });

        socket.on('disconnect', () => {
            document.getElementById('status').textContent = 'Disconnected';
        });
    </script>
</body>
</html>
